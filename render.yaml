# Deployment: Render (backend API + worker) + Vercel (frontend) + Supabase (Postgres)
# Redis removed — queue uses database driver; cache and session use file driver.
# No Render-managed Postgres — connect to Supabase via DB_* env vars below.
services:
  - type: web
    name: slides-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          name: slides-web
          type: web
          property: host
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      # --- Supabase Postgres credentials ---
      # sync: false means you must enter these manually in the Render dashboard (Environment tab).
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSLMODE
        value: require
      # --- Queue / cache / session (no Redis) ---
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      # --- CORS: optional — set to your Vercel frontend URL to enable cross-origin requests.
      # Leave unset (or empty) if not using a separate frontend on Vercel. ---
      - key: FRONTEND_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o

  - type: worker
    name: slides-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: php artisan queue:work --sleep=3 --tries=3 --timeout=90 --queue=default
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        fromService:
          name: slides-web
          type: web
          envVarKey: APP_KEY
      - key: APP_URL
        fromService:
          name: slides-web
          type: web
          property: host
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      # --- Supabase Postgres (shared from web service) ---
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromService:
          name: slides-web
          type: web
          envVarKey: DB_HOST
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        fromService:
          name: slides-web
          type: web
          envVarKey: DB_DATABASE
      - key: DB_USERNAME
        fromService:
          name: slides-web
          type: web
          envVarKey: DB_USERNAME
      - key: DB_PASSWORD
        fromService:
          name: slides-web
          type: web
          envVarKey: DB_PASSWORD
      - key: DB_SSLMODE
        value: require
      # --- Queue / cache / session (no Redis) ---
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: OPENAI_API_KEY
        fromService:
          name: slides-web
          type: web
          envVarKey: OPENAI_API_KEY
      - key: OPENAI_MODEL
        value: gpt-4o
